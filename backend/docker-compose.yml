services:
  mysql:
    image: mysql:8.0
    container_name: nft-auction-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nft_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: auction
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "auction", "-pauction"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data: